services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      BUCKET_URI: /app/bucket
      MODEL_DIR: /app/models
    volumes:
      - ./bucket:/app/bucket
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import requests;requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
  app:
    build: .
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_URL: "http://api:8000"
    ports: ["8501:8501"]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests;requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
